<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Leonardo Lima</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="cabecalho">
        <nav class="navbar">
            <a href="index.html" class="logo">Leonardo Lima</a>
            
            <ul class="menu" id="menu">
                <li><a href="sobre.html">Sobre mim</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>

            <div class="nav-actions">
                <button id="btnTema" title="Alternar tema">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button id="menuToggle" aria-label="Abrir menu">☰</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="secao pagina">
            <h2>Contato</h2>

            <p class="texto-secao">
                Preencha o formulário abaixo e envie a sua mensagem.
            </p>

            <form class="formulario" id="formContato">
                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
                    <span class="erro" id="erroNome"></span>
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail">
                    <span class="erro" id="erroEmail"></span>
                </div>

                <div class="campo">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea>
                    <span class="erro" id="erroMensagem"></span>
                </div>

                <button type="submit" class="btn-principal">
                    Enviar mensagem
                </button>

                <p class="mensagem-sucesso" id="mensagemSucesso"></p>
            </form>
        </section>
    </main>

    <footer class="rodape">
        <p>&copy; 2026 Leonardo Lima. Portfólio desenvolvido com HTML5, CSS3 e JavaScript.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
